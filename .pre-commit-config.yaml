exclude: '^(pipenv/patched/|pipenv/vendor/|tests/|pipenv/pipenv.1)'

repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.6.0
  hooks:
  - id: check-builtin-literals
  - id: check-added-large-files
  - id: check-case-conflict
  - id: check-ast
  - id: check-toml
  - id: check-yaml
  - id: debug-statements
  - id: end-of-file-fixer
    exclude: WHEEL|\.patch$
  - id: forbid-new-submodules
  - id: trailing-whitespace
    exclude: .patch

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.9.3
  hooks:
  - id: ruff

- repo: https://github.com/pre-commit/pygrep-hooks
  rev: v1.10.0
  hooks:
  - id: python-no-log-warn
  - id: python-no-eval
  - id: rst-backticks
    files: .*\.rst$
    types: [file]

- repo: local
  hooks:
  - id: news-fragment-filenames
    name: NEWS fragment
    language: fail
    entry: NEWS fragment files must be named *.(feature|behavior|bugfix|vendor|doc|trivial|removal|process).rst
    exclude: ^news/(towncrier_template.rst|.*\.(feature|behavior|bugfix|vendor|doc|trivial|removal|process).rst)
    files: ^news/
  - id: no-pip-internal-in-resolver
    # Initiative G phase 1 (T17) — enforce the acceptance criterion
    # that pipenv/resolver/ has no ``pip._internal`` imports.  The
    # pattern anchors on actual import statements at start of
    # (optionally indented) lines, so docstring / comment / literal
    # mentions of the path do not false-positive (T1's gotcha).
    # Tests under tests/ — including T10's deliberate parity import —
    # are exempt via ``files: ^pipenv/resolver/``.
    name: pipenv/resolver must not import pip._internal
    entry: |
      bash -c '
      if grep -RnE "^[[:space:]]*(from|import)[[:space:]]+pipenv\.patched\.pip\._internal" pipenv/resolver/; then
        echo "ERROR: pipenv/resolver/ must not import from pipenv.patched.pip._internal (Initiative G acceptance criterion)";
        echo "If this is intentional for a parity test, the test belongs under tests/, NOT pipenv/resolver/";
        exit 1;
      fi
      '
    language: system
    types: [python]
    files: ^pipenv/resolver/
    pass_filenames: false

- repo: https://github.com/mgedmin/check-manifest
  rev: '0.49'
  hooks:
  - id: check-manifest
    stages: [manual]

- repo: https://github.com/tox-dev/pyproject-fmt
  rev: "2.4.3"
  hooks:
  - id: pyproject-fmt

- repo: https://github.com/abravalheri/validate-pyproject
  rev: v0.19
  hooks:
  - id: validate-pyproject
